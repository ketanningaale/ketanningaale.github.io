<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ketann Ingaale</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & tokens ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-deep:    #0d0a14;
      --bg-mid:     #13101e;
      --bg-card:    rgba(255,255,255,0.04);
      --border:     rgba(255,255,255,0.08);

      --purple-dim: #3b2f6e;
      --purple:     #7c5cbf;
      --mauve:      #b78de0;
      --rose:       #d4a0c8;
      --blush:      #e8c4d8;
      --dusk-blue:  #4a6fa5;
      --amber:      #d4956a;

      --text-primary:   #ede8f5;
      --text-secondary: #9d93b8;
      --text-muted:     #5e5878;

      --font-body:    'Inter', sans-serif;
      --font-display: 'Syne', sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-body);
      background: var(--bg-deep);
      color: var(--text-primary);
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* ── Nav ────────────────────────────────────────────────────── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.25rem 3rem;
      background: rgba(13,10,20,0.6);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo {
      font-family: var(--font-display);
      font-size: 1.2rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--mauve), var(--rose));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
    }

    .nav-links a {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      transition: color 0.25s;
    }

    .nav-links a:hover { color: var(--text-primary); }

    /* ── Hero ───────────────────────────────────────────────────── */
    #hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Canvas aurora lives behind everything */
    #aurora {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    /* Radial vignette over canvas */
    #hero::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 60%, transparent 30%, var(--bg-deep) 100%);
      pointer-events: none;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 2rem;
      max-width: 820px;
    }

    .hero-tag {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--amber);
      border: 1px solid rgba(212,149,106,0.35);
      border-radius: 100px;
      padding: 0.35rem 1rem;
      margin-bottom: 1.75rem;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.2s forwards;
    }

    .hero-name {
      font-family: var(--font-display);
      font-size: clamp(3rem, 8vw, 6.5rem);
      font-weight: 800;
      line-height: 1.0;
      letter-spacing: -0.03em;
      opacity: 0;
      animation: fadeUp 0.9s ease 0.4s forwards;
    }

    .hero-name .line-1 {
      display: block;
      background: linear-gradient(120deg, var(--text-primary) 0%, var(--blush) 50%, var(--mauve) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-name .line-2 {
      display: block;
      background: linear-gradient(120deg, var(--mauve) 0%, var(--rose) 60%, var(--amber) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      margin-top: 1.5rem;
      font-size: clamp(1rem, 2vw, 1.2rem);
      color: var(--text-secondary);
      font-weight: 300;
      line-height: 1.7;
      opacity: 0;
      animation: fadeUp 0.9s ease 0.6s forwards;
    }

    .hero-sub strong {
      color: var(--blush);
      font-weight: 500;
    }

    .hero-cta {
      margin-top: 2.5rem;
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
      opacity: 0;
      animation: fadeUp 0.9s ease 0.8s forwards;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.75rem;
      border-radius: 100px;
      font-size: 0.9rem;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.25s;
      cursor: pointer;
      border: none;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--purple), var(--mauve));
      color: #fff;
      box-shadow: 0 0 24px rgba(124,92,191,0.45);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 36px rgba(124,92,191,0.65);
    }

    .btn-ghost {
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover {
      color: var(--text-primary);
      border-color: rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.04);
    }

    /* scroll indicator */
    .scroll-hint {
      position: absolute;
      bottom: 2.5rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      opacity: 0;
      animation: fadeIn 1s ease 1.4s forwards;
    }

    .scroll-hint span {
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .scroll-line {
      width: 1px;
      height: 48px;
      background: linear-gradient(to bottom, var(--text-muted), transparent);
      animation: scrollPulse 2s ease-in-out infinite;
    }

    /* ── Keyframes ──────────────────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @keyframes scrollPulse {
      0%, 100% { opacity: 0.3; transform: scaleY(1); }
      50%       { opacity: 1;   transform: scaleY(1.1); }
    }

    /* ── Placeholder sections (coming soon) ────────────────────── */
    section {
      padding: 7rem 3rem;
      max-width: 1100px;
      margin: 0 auto;
    }

    .section-label {
      font-size: 0.72rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--amber);
      margin-bottom: 0.75rem;
    }

    .section-title {
      font-family: var(--font-display);
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.1;
      color: var(--text-primary);
    }

    /* ── Responsive ─────────────────────────────────────────────── */
    @media (max-width: 640px) {
      nav { padding: 1rem 1.5rem; }
      .nav-links { display: none; }
      section { padding: 5rem 1.5rem; }
    }
  </style>
</head>
<body>

  <!-- Nav -->
  <nav>
    <span class="nav-logo">KI</span>
    <ul class="nav-links">
      <li><a href="#about">About</a></li>
      <li><a href="#experience">Experience</a></li>
      <li><a href="#projects">Projects</a></li>
      <li><a href="#skills">Skills</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
  </nav>

  <!-- Hero -->
  <section id="hero">
    <canvas id="aurora"></canvas>

    <div class="hero-content">
      <span class="hero-tag">Data Scientist &amp; ML Engineer</span>

      <h1 class="hero-name">
        <span class="line-1">Ketann</span>
        <span class="line-2">Ingaale</span>
      </h1>

      <p class="hero-sub">
        Turning raw data into <strong>decisions that matter</strong>.<br/>
        MSc Data Science · Ex-Infosys · LiDAR · NLP · Cloud
      </p>

      <div class="hero-cta">
        <a href="#projects" class="btn btn-primary">View my work</a>
        <a href="#contact" class="btn btn-ghost">Get in touch</a>
      </div>
    </div>

    <div class="scroll-hint">
      <span>Scroll</span>
      <div class="scroll-line"></div>
    </div>
  </section>

  <!-- Placeholder anchors for nav links (sections added next) -->
  <div id="about"></div>
  <div id="experience"></div>
  <div id="projects"></div>
  <div id="skills"></div>
  <div id="contact"></div>

  <!-- ── Aurora canvas script ──────────────────────────────────── -->
  <script>
    const canvas = document.getElementById('aurora');
    const ctx    = canvas.getContext('2d');

    let W, H, blobs;

    // Dusk aurora palette
    const COLORS = [
      [124,  92, 191],   // purple
      [183, 141, 224],   // mauve
      [212, 160, 200],   // rose
      [ 74, 111, 165],   // dusk blue
      [212, 149, 106],   // amber
      [ 59,  47, 110],   // purple-dim
    ];

    function resize() {
      W = canvas.width  = canvas.offsetWidth;
      H = canvas.height = canvas.offsetHeight;
    }

    function makeBlob(i) {
      const c = COLORS[i % COLORS.length];
      return {
        x: Math.random() * W,
        y: Math.random() * H,
        r: 280 + Math.random() * 360,
        vx: (Math.random() - 0.5) * 0.35,
        vy: (Math.random() - 0.5) * 0.22,
        color: c,
        alpha: 0.06 + Math.random() * 0.10,
      };
    }

    function init() {
      resize();
      blobs = Array.from({ length: 7 }, (_, i) => makeBlob(i));
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);

      for (const b of blobs) {
        const g = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.r);
        const [r, g2, bl] = b.color;
        g.addColorStop(0,   `rgba(${r},${g2},${bl},${b.alpha})`);
        g.addColorStop(0.5, `rgba(${r},${g2},${bl},${b.alpha * 0.4})`);
        g.addColorStop(1,   `rgba(${r},${g2},${bl},0)`);
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
        ctx.fill();

        b.x += b.vx;
        b.y += b.vy;
        if (b.x < -b.r || b.x > W + b.r) b.vx *= -1;
        if (b.y < -b.r || b.y > H + b.r) b.vy *= -1;
      }

      requestAnimationFrame(draw);
    }

    window.addEventListener('resize', () => { resize(); });
    init();
    draw();
  </script>
</body>
</html>
